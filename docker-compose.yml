services:
  lms-frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-lms-frontend:latest

  visit-frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-visit-frontend:latest

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-haskell-backend:latest

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - lms-frontend
      - visit-frontend
