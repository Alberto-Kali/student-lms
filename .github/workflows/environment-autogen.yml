name: Environment Manifests Autogen

on:
  workflow_dispatch:
  pull_request_review:
    types: [submitted]
    branches:
      - lms-frontend
      - visit-frontend
      - python-backend
      - haskell-backend
  push:
    branches:
      - lms-frontend
      - visit-frontend
      - python-backend
      - haskell-backend

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate manifests and open PRs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.event_name == 'pull_request_review' && github.event.pull_request.base.ref || github.ref_name }}
          PR_NUMBER: ${{ github.event_name == 'pull_request_review' && github.event.pull_request.number || 0 }}
          HEAD_SHA: ${{ github.event_name == 'pull_request_review' && github.event.pull_request.head.sha || github.sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          OWNER_LOWER="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          SHA_SHORT="${HEAD_SHA:0:12}"

          case "$BASE_BRANCH" in
            lms-frontend|visit-frontend)
              TARGET_ENVS=(dev preproduction)
              ;;
            python-backend)
              TARGET_ENVS=(dev)
              ;;
            haskell-backend)
              TARGET_ENVS=(dev preproduction)
              ;;
            *)
              echo "Unsupported service branch: $BASE_BRANCH"
              exit 0
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          write_smoke_python() {
            cat > docker-compose.smoke-python.yml <<EOF
            services:
              clickhouse:
                image: clickhouse/clickhouse-server:25.3
                pull_policy: always
                environment:
                  CLICKHOUSE_DB: lms
                  CLICKHOUSE_USER: lms
                  CLICKHOUSE_PASSWORD: lms_dev_password
                ports:
                  - "\${CLICKHOUSE_HTTP_PORT:-18123}:8123"
                  - "\${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
                volumes:
                  - smoke_python_clickhouse_data:/var/lib/clickhouse
                healthcheck:
                  test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              backend:
                image: ghcr.io/${OWNER_LOWER}/lms-python-backend:latest
                pull_policy: always
                environment:
                  LMS_CLICKHOUSE_HOST: clickhouse
                  LMS_CLICKHOUSE_PORT: 8123
                  LMS_CLICKHOUSE_DATABASE: lms
                  LMS_CLICKHOUSE_USER: lms
                  LMS_CLICKHOUSE_PASSWORD: lms_dev_password
                depends_on:
                  clickhouse:
                    condition: service_healthy

              lms-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-lms-frontend:latest
                pull_policy: always
                depends_on:
                  - backend

              visit-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-visit-frontend:latest
                pull_policy: always
                depends_on:
                  - backend

              nginx:
                image: nginx:1.27-alpine
                pull_policy: always
                ports:
                  - "\${PUBLIC_PORT:-18081}:80"
                volumes:
                  - ./nginx/smoke-python.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                  - lms-frontend
                  - visit-frontend

            volumes:
              smoke_python_clickhouse_data:
            EOF
            sed -i 's/^            //' docker-compose.smoke-python.yml

            cat > nginx/smoke-python.conf <<EOF
            server {
              listen 80;
              server_name _;

              location /api/ {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://backend:8000;
              }

              location /visit/ {
                rewrite ^/visit/?(.*)$ /\$1 break;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://visit-frontend:80;
              }

              location / {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://lms-frontend:80;
              }
            }
            EOF
            sed -i 's/^            //' nginx/smoke-python.conf
          }

          write_smoke_visit() {
            cat > docker-compose.smoke-visit.yml <<EOF
            services:
              clickhouse:
                image: clickhouse/clickhouse-server:25.3
                pull_policy: always
                environment:
                  CLICKHOUSE_DB: lms
                  CLICKHOUSE_USER: lms
                  CLICKHOUSE_PASSWORD: lms_dev_password
                volumes:
                  - smoke_visit_clickhouse_data:/var/lib/clickhouse
                healthcheck:
                  test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
                  interval: 10s
                  timeout: 5s
                  retries: 20

              backend:
                image: ghcr.io/${OWNER_LOWER}/lms-python-backend:latest
                pull_policy: always
                environment:
                  LMS_CLICKHOUSE_HOST: clickhouse
                  LMS_CLICKHOUSE_PORT: 8123
                  LMS_CLICKHOUSE_DATABASE: lms
                  LMS_CLICKHOUSE_USER: lms
                  LMS_CLICKHOUSE_PASSWORD: lms_dev_password
                depends_on:
                  clickhouse:
                    condition: service_healthy

              visit-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-visit-frontend:latest
                pull_policy: always
                depends_on:
                  - backend

              nginx:
                image: nginx:1.27-alpine
                pull_policy: always
                ports:
                  - "\${PUBLIC_PORT:-18082}:80"
                volumes:
                  - ./nginx/smoke-visit.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                  - visit-frontend

            volumes:
              smoke_visit_clickhouse_data:
            EOF
            sed -i 's/^            //' docker-compose.smoke-visit.yml

            cat > nginx/smoke-visit.conf <<EOF
            server {
              listen 80;
              server_name _;

              location /api/ {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://backend:8000;
              }

              location / {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://visit-frontend:80;
              }
            }
            EOF
            sed -i 's/^            //' nginx/smoke-visit.conf
          }

          write_smoke_haskell() {
            cat > docker-compose.smoke-haskell.yml <<EOF
            services:
              lms-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-lms-frontend:latest
                pull_policy: always

              visit-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-visit-frontend:latest
                pull_policy: always

              backend:
                image: ghcr.io/${OWNER_LOWER}/lms-haskell-backend:latest
                pull_policy: always

              nginx:
                image: nginx:1.27-alpine
                pull_policy: always
                ports:
                  - "\${PUBLIC_PORT:-18083}:80"
                volumes:
                  - ./nginx/smoke-haskell.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                  - lms-frontend
                  - visit-frontend
            EOF
            sed -i 's/^            //' docker-compose.smoke-haskell.yml

            cat > nginx/smoke-haskell.conf <<EOF
            server {
              listen 80;
              server_name _;

              location /api/ {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://backend:8080;
              }

              location /visit/ {
                rewrite ^/visit/?(.*)$ /\$1 break;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://visit-frontend:80;
              }

              location / {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://lms-frontend:80;
              }
            }
            EOF
            sed -i 's/^            //' nginx/smoke-haskell.conf
          }

          write_preproduction() {
            cat > docker-compose.yml <<EOF
            services:
              lms-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-lms-frontend:latest
                pull_policy: always

              visit-frontend:
                image: ghcr.io/${OWNER_LOWER}/lms-visit-frontend:latest
                pull_policy: always

              backend:
                image: ghcr.io/${OWNER_LOWER}/lms-haskell-backend:latest
                pull_policy: always

              nginx:
                image: nginx:1.27-alpine
                pull_policy: always
                ports:
                  - "\${PUBLIC_PORT:-8080}:80"
                volumes:
                  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                  - lms-frontend
                  - visit-frontend
            EOF
            sed -i 's/^            //' docker-compose.yml

            cat > nginx/default.conf <<EOF
            server {
              listen 80;
              server_name _;

              location /api/ {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://backend:8080;
              }

              location /visit/ {
                rewrite ^/visit/?(.*)$ /\$1 break;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://visit-frontend:80;
              }

              location / {
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_pass http://lms-frontend:80;
              }
            }
            EOF
            sed -i 's/^            //' nginx/default.conf
          }

          for ENV_NAME in "${TARGET_ENVS[@]}"; do
            WORK_BRANCH="chore/autogen-${ENV_NAME}-${BASE_BRANCH}"

            git fetch origin "$ENV_NAME"
            git checkout -B "$WORK_BRANCH" "origin/$ENV_NAME"

            mkdir -p environments/generated nginx

            rm -f docker-compose.yml docker-compose.smoke-python.yml docker-compose.smoke-visit.yml docker-compose.smoke-haskell.yml
            rm -f nginx/default.conf nginx/smoke-python.conf nginx/smoke-visit.conf nginx/smoke-haskell.conf
            rm -rf k8s

            if [[ "$ENV_NAME" == "dev" ]]; then
              write_smoke_python
              write_smoke_visit
              write_smoke_haskell
            else
              write_preproduction
            fi

            cat > environments/generated/metadata.txt <<EOF
            source_service_branch=${BASE_BRANCH}
            trigger=${GITHUB_EVENT_NAME}
            pr_number=${PR_NUMBER}
            source_sha=${HEAD_SHA}
            source_sha_short=${SHA_SHORT}
            generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            target_env=${ENV_NAME}
            EOF
            sed -i 's/^            //' environments/generated/metadata.txt

            git add -A docker-compose.yml \
                       docker-compose.smoke-python.yml \
                       docker-compose.smoke-visit.yml \
                       docker-compose.smoke-haskell.yml \
                       nginx \
                       environments/generated

            if git diff --cached --quiet; then
              echo "No manifest changes for ${ENV_NAME}"
              continue
            fi

            git commit -m "chore(env): regenerate ${ENV_NAME} runtime manifests from ${BASE_BRANCH} PR #${PR_NUMBER}"
            git push --force-with-lease origin "HEAD:${WORK_BRANCH}"

            EXISTING_PR="$(gh pr list --base "$ENV_NAME" --head "$WORK_BRANCH" --json number --jq '.[0].number')"
            PR_TITLE="chore(env): refresh ${ENV_NAME} manifests from ${BASE_BRANCH}"
            PR_BODY=$(printf '## Summary\n- regenerate compose manifests for %s\n- source branch: %s\n- trigger: %s\n- source sha: %s\n- source PR: %s\n' \
              "$ENV_NAME" \
              "$BASE_BRANCH" \
              "$GITHUB_EVENT_NAME" \
              "$HEAD_SHA" \
              "$PR_NUMBER")

            if [[ -n "$EXISTING_PR" ]]; then
              gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            else
              gh pr create --base "$ENV_NAME" --head "$WORK_BRANCH" --title "$PR_TITLE" --body "$PR_BODY"
            fi
          done
