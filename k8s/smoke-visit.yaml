apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-smoke-visit
  namespace: dev
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
      }

      location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://visit-frontend:80;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-visit
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-visit
  template:
    metadata:
      labels:
        app: backend-visit
    spec:
      containers:
        - name: backend
          image: ghcr.io/alberto-kali/lms-python-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev
spec:
  selector:
    app: backend-visit
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visit-frontend-only
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visit-frontend-only
  template:
    metadata:
      labels:
        app: visit-frontend-only
    spec:
      containers:
        - name: visit-frontend
          image: ghcr.io/alberto-kali/lms-visit-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: visit-frontend
  namespace: dev
spec:
  selector:
    app: visit-frontend-only
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-smoke-visit
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-smoke-visit
  template:
    metadata:
      labels:
        app: nginx-smoke-visit
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-smoke-visit
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-smoke-visit
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: nginx-smoke-visit
  ports:
    - port: 80
      targetPort: 80
