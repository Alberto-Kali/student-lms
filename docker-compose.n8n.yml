services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_pre_password
      POSTGRES_DB: n8n
    volumes:
      - n8n_pre_postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:1.89.2
    ports:
      - "5678:5678"
    env_file:
      - ./n8n/.env.example
    depends_on:
      - postgres
    volumes:
      - n8n_pre_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro

volumes:
  n8n_pre_postgres_data:
  n8n_pre_data:
