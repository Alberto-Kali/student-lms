services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-haskell-backend:latest

  lms-frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-lms-frontend:latest
    depends_on:
      - backend

  visit-frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/alberto-kali}/lms-visit-frontend:latest
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "18083:80"
    volumes:
      - ./nginx/smoke-haskell.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - lms-frontend
      - visit-frontend
